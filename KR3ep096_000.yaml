body:
  text: 溫溫邪身熱熱不揚一候矣脈數無力舌苔白不厚老年正虛乏力送邪外達急解之以防內走大豆卷真川貝淨連喬枇杷葉廣陳皮竹茹白杏仁霜桑葉雲茯苓溫邪挾濕胸悶脈數表熱咳嗽邪戀肺胃也清解之川桂枝仙半夏淨連翹大豆卷廣陳皮雲茯苓廣藿香江枳殼生甘草濕溫發熱四日有汗不解脈濡舌不生苔邪深戀也大豆卷江枳殼淨連喬杜藿梗仙半夏竹茹枇杷葉廣陳皮雲茯苓大麥芽濕溫病一候之前惟宜解達大豆卷仙半夏雲茯苓杜藿梗廣陳皮川通草江枳殼白蔻仁濕溫五日陽明表裡兼阻三焦不通上下失貫陡致厄忒脈細且伏一候不得大汗慮其神昏變幻枇杷葉淨連喬雲茯苓玉桔梗廣橘紅柿蒂白杏仁竹茹刀豆子白茅根濕溫解後復病灼熱無汗頭蒙膺悶表里兩阻煩勞之體兼發勞倦病甫兩日溫邪挾滯周體作痛表熱脈數解達之大豆卷仙半夏淨連喬霜桑葉廣陳皮竹茹白杏仁枇杷葉雲茯苓川通草邪正張揚非輕淺者梔子枳實淨連喬淡豆豉仙半夏竹茹制香附廣陳皮大麥芽濕溫內蒸一旬餘而不解仍戀陽明濕乃黏著之邪是以纏和之清之大豆卷江枳殼竹茹仙半夏大腹皮雲茯苓廣陳皮淨連喬川通草大麥芽濕溫化火內蒸兩候餘矣脈細弦數舌紅苔剝渴飲初起似瘧灼傷陰液連熱不已陽明之邪多於少陽甘涼辛涼玎濟之羚羊角霜桑葉淨連喬鮮生地白杏仁天花粉枇杷葉川貝母竹茹濕溫病邪迫臟腑而致便泄表熱仍蒸脈細數耎舌乾苔黃詢是濕熱內蒸陽明表裡俱病當從手足二經治之杜藿梗雲茯苓生甘草淡黃芩山查炭大麥芽陳廣皮建神麯青荷梗溫邪退而復蒸蒸而復退胸膈稍舒脈數未和將在化火又恐復熱常以清解羚羊角川貝母雲茯苓大豆卷淨連喬廣橘白枇杷葉天花粉白茆根青荷梗濕熱蒸於內暑氣侵於外蒸灼三候有餘舌絳無苔嗌乾渴飲脈細弦數陽明熱深且熾矣宜乎甘寒化解大生地肥知母淡竹葉大麥冬川貝母粳米生石膏淨連喬藕汁枇杷葉蔗漿陽明濕邪甫一候汗出未遍猶是蒸熱尚在氣分幸未侵營仍從陽明氣分清達滋熄羚羊角白杏仁玉枯梗淡豆豉川旦母淨連喬大生地天花粉橘紅枇杷葉暴暑侵感身熱往來脈數渴飲達之香青蒿江枳殼竹茹大豆卷淨連翹雲茯苓川貝母廣橘白青荷梗暑氣熏蒸挾滯阻腑脘腹痛而便祕芳香宣通之杜藿梗火麻仁廣桔白制香附大砂仁云伏苓瓜蔞仁江枳殼大麥芽暑濕熱混蒸發熱嘔惡舌垢便利脈濡數三焦不通先以解達兼和之真川連仙半夏竹茹杜藿梗廣陳皮雲茯苓大豆卷江枳殼川通草大麥芽病一候酷暑助邪鬱蒸於陽明表不達汗脈細數不顯舌紅苔垢邪伏也非輕淺者黃連溫膽湯加羚羊角枇杷葉病九日酷暑日逼更易化火舌絳液涸脈極數急清之烏犀角川貝母江枳殼羚羊角天花粉淨連喬大生地霍石斛淡竹葉暑傷氣營舌絳脈數辛寒甘寒清解之烏犀角生石膏淨連喬大生地川貝母枇杷葉大麥冬肥知母淡竹葉暑暍薰蒸發熱朝緩夕劇頭蒙脈濡舌垢邪深戀伏一候解達為串杜藿梗廣橘白飛滑石淡豆豉江枳殼雲茯苓仙半夏淨連翹白蔻仁川通草暑熱薰灼晨退午蒸陽明病也一候之前只宜解達社藿梗仙半夏淨連翹淡豆豉廣橘白雲茯苓江枳殼竹茹六一散表解而里未和也清之和之溫膽湯加鮮石斛蓮子穀芽病一候暑濕深伏陽明嘔惡舌垢脈數不歇邪戀不解且與苦泄黃連溫膽湯加廣藿香淨連翹飛滑石暑濕內蒸身熱作咳舌垢脈數一候矣仍當解達黃連溫膽湯去草加枇杷葉白杏仁飛滑石川通草香薷傷暑發熱旬日愈而復蒸神蒙脈數舌有苔渴症非淺者羚羊角仙半夏淨連翹大豆卷廣橘白竹茹杜藿梗江枳完雲茯苓素有血症陰分內熱近感暑熱日午潮熱脈細小數陰虛內熱宜乎清化羚羊角川貝母淨連翹大生地天花粉香青蒿霍石斛廣橘白雲茯苓煩勞傷中藉感暑邪表發熱頻厄手振脈數而虛氣虛邪戀非輕淺者扶氣達邪投之再處人參鬚江枳殼公丁香旋覆花竹茹柿蒂枇杷葉刀豆子白茅根暑傷氣氣虛厄清暑必主扶氣人參鬚仙半夏刀豆子旎復花廣橘紅柿蒂代赭石竹茹生甘草枇杷葉暑風閉腠發熱頭蒙胸悶嘔惡脈濡數汗不遍身舌無苔邪深戀也解達之香薷仙半夏杜藿梗川連廣陳皮雲茯苓大麥芽汗出熱不退邪深戀也病已一候清達為宜羚羊角枇杷葉淨連翹大豆卷竹茹廣陳皮白杏仁江枳殼生甘草風熱內蒸暑風外侵三候餘而表熱未解化火傷陰劫津脈極滑數深戀陽明勢將走入陰經非輕淺清解達泄辛涼甘涼兼施之烏犀角川具母枇杷葉羚羊角肥知母白茅根鮮生地淨連翹竹瀝金石斛冬瓜子陽明熱熾劫津生痰深戀肺胃咳不爽脈濡數與西昌法烏犀角霜桑葉淨連翹鮮生地白杏仁枇耙葉生石膏川貝母生甘草竹瀝暑風發熱襲於肺中咯吐腥痰脈極數舌絳乾涸陽明熱熾戕陰也滋清之羚羊角真川貝白杏仁鮮生地肥知母淨連翹大豆卷天花粉冬瓜子白茅根現發疝氣厥陰疾也又襲暑風音嘶發熱舌白膩脈浮數陽明病也先去客邪而後治疝從陽明表分立方杜藿梗仙半夏淨連翹大豆卷廣陳皮雲茯苓玉桔梗江枳殼川通草青荷梗表熱里泄脘悶腹痛脈弦數舌經苔黃暑濕兼滯病在少陽陽明之間宜乎表裡兩解柴胡淡黃芩福澤瀉粉葛根山查炭廣橘白廣本香建神麯雲茯苓大砂仁里泄雖止表熱未清穀入腹痛仍應溫中真川連建神麯廣陳皮粉葛根山查炭雲茯苓淡黃芩生米仁大麥芽飛滑石生甘草傷暑發熱纏匝月發熱不壯當可納穀是以未走營分仍在氣分尚當清達香青蒿霜桑葉竹茹淡黃芩江枳殼冬瓜子白杏仁川貝母雲茯苓玉桔梗淨連翹暴暑薰蒸偶爾感受嘔妨谷脘悶蒙脈濡且數三焦不宣先當清暑主用芳香廣藿香仙半夏江枳殼干佩蘭廣陳皮雲茯苓飛滑石淨連翹大麥仁青荷梗始而作咳繼而咽塞妨谷脘悶腹膨脈濡澀且便溏匯三焦不宣不貫吸受暑邪致此芳香宣達以通三焦杜藿梗江枳殼雲茯苓玉桔梗建神麯川通草大腹皮廣陳皮鮮荷葉失血之後陰虛內蒸又感暑邪發熱二候脈細數宜乎從陰化邪鮮生地淡豆豉同打淨連翹淡竹葉天花粉枇杷葉羚羊角川貝母青荷梗傷暑旬日表里俱阻氣逆嘔吐脈濡數伏不慎起居病將增劇焉可就診傷暑而又被暑侵也如之何則可真川連江枳殼雲茯苓仙半夏建神麯鮮稻葉廣陳皮竹茹鮮荷葉晝暑夜涼感於陽明兼走少陽脈弦數舌黃苔垢妨穀粒陽明邪多於少陽清化之羚羊角霜桑葉淨連翹鮮生地仙半夏冬瓜子大豆卷江枳殼蘆根枇杷葉白杏仁伏暑似瘧挾濕內蒸表熱甫退脈滑數舌紅苔黃而垢膩邪未淨也清化之香青蒿天花粉淨連翹鮮石斛川貝母竹茹枇杷葉肥知母廣橘紅鮮稻葉秋暑蒸灼但熱不寒有似疸瘧脈細數弦滑起於午蒸於晡劇於夜甫於一候仍應解達大豆卷江枳殼雲茯苓老蘇梗天花粉川通草淨連翹廣陳皮伏暑發熱甫四日邪戀陽明之表先當解達杜藿梗江枳殼淨連翹淡豆豉廣陳皮雲茯苓枇杷葉白蔻仁大麥仁川通草日哺不寒而熱脈濡數滑舌紅苔黃暑邪內伏欲化火辛涼清之香青蒿粉丹皮淨連翹白杏仁川貝母廣橘紅枇杷葉肥知母雲茯苓大麥仁伏暑發熱退而復蒸舌紅苔黃垢膩脈弦滑數秋令行與西昌法羚羊角生石膏淨連翹霍斛霜桑葉廣陳皮鮮生地白杏仁生甘草枇杷葉伏暑挾濕內蒸似瘧不準脈細弦數舌苔滑膩納穀腹膨表熱不振邪戀陽明老年氣虛而不能振達也杜藿梗廣陳皮淨連翹大腹皮生薑皮雲茯苓桑白皮江枳殼新涼束暑屢欲發熱不定日期脈弦細舌灰苔干陰分漸虛暑濕猶戀當清少陽之熱香青蒿川貝母江枳殼大生地地骨皮廣橘紅霍斛淨連翹雲茯苓竹茹陽明伏暑經府交病表熱里泄脈弦細數五日矣與柴葛解肌法柴胡仙半夏建神麯粉葛根廣陳皮生甘草淡黃芩江枳殼雲茯苓竹茹伏暑兩候邪火深熾劫奪陽明津液勢將內陷生風形神色脈一派火象急投辛寒甘寒已嫌遲也烏犀角霍斛淨連翹鮮生地川貝母陳膽星大麥冬肥知母人中黃竹瀝伏暑甫熱微蒸不寒而熱脈細弦高年矣輕味清化之香青蒿肥知母廣橘紅大生地地骨皮雲茯苓霍斛淨連翹稻穀秋暑化燥燥邪入肺咽痛咳嗆入夜微熱舌紅苔黃脈細數少陽之陽明兼症清達之黃連溫膽湯加霜桑葉枇杷葉白杏仁玉桔梗涼風束暑暑熱內蒸不達於表頭痛脈弦膺悶纏多日由陽明而走少陽仍應清化羚羊角地骨皮廣橘白大生地女貞子雲茯苓白蒺莉淨連翹秋暑灼肺咳嗆發熱頭痛脈細數衰年矣慮其不勝灼熱內走之虞羚羊角霜桑葉淨連翹大豆卷川貝母青荷梗玉桔梗江枳殼伏暑逾一候依然薰熱舌紅不起苔唇燥皮赤者邪化火而不達復增寒熱咳嗽邪兼於肺幸也宜從陽明立方羚羊角白杏仁淨漣翹大豆卷川貝母枳實枇杷葉天花粉廣橘紅竹茹秋金燥邪灼肺咳嗆晡熱脈浮數舌紅苔黃嗌乾宜清之大豆卷霜桑葉淨連翹玉桔梗白杏仁蛤谷枇杷葉川貝母廣橘紅伏暑內熱纏兩旬似瘧不準退而復熱熱而復退舌白脈濡膺悶未經汗解邪猶深戀少陽陽明兼症辛涼甘涼相濟而施一定之理也羚羊角仙半夏淨連翹白杏仁廣陳皮大麥仁枇杷葉枳實雲茯苓竹茹伏邪發熱秋杪燥令尚甚熱戀陽明化火內熾唇燥齒乾脈數身熱劇於夜分清達宜主辛涼烏犀角川貝母淨連翹金石斛肥知母枇杷葉大生地天花粉人中黃伏暑發於秋末先寒後熱已交初冬似瘧不準從未服劑伏邪深戀清解少陽陽明一定之理也茯苓霜桑葉仙半夏天花粉淡黃芩廣陳皮竹茹香青蒿江枳殼枇杷葉伏暑至秋牛而發不寒而熱熱作於夜脈細弦舌苔膩口甜作渴妨飲陽明濕熱暗助少陽之暑邪也本質之濕熱浮於秋令之暑熱桂枝白虎合二陳湯二法兼施加稻穀伏邪發於初冬不達於外內蒸轉劇發熱咳嗽脈極數而細軟纏之邪未達而陰驟虛舌絳黃苔灰垢邪猶內燔正氣不支邪正兩脫不可不慮也金石斛生石膏石決明生地川貝母茯神大麥冬肥知母枇杷葉陽明熱熾邪已化火灼陰涸液肝風欲動仍在險途也鮮生地肥知母雲茯苓生石膏石決明淡竹瀝大麥冬枇杷葉陽明邪火內熾連進甘寒似有出表之機且與西昌法烏犀角霜桑葉川貝母鮮生地白杏仁生甘草大麥冬生石膏枇杷葉陽明熱熾暗灼真陰滋陰滌熱必然矣烏犀角生石膏茯神鮮生地川貝母枇杷葉大麥冬肥知母淡竹油石決明淨連翹感冒新寒營衛失和諸絡痠楚脈濡澀細當歸桂枝湯加味治之白當歸炮姜廣陳皮川桂枝上白朮雲茯苓大白芍大麥冬生甘草枸杞子新寒里食身熱而脘痛且和之疏泄之紫蘇梗仙半夏淨連翹白杏仁廣陳皮雲茯苓大麥冬江枳殼大腹皮南查炭親寒襲衛惡風發熱頭痛脈浮數解達之大豆卷仙半夏白茯苓白杏仁廣陳皮川通草霜桑葉江枳殼枇杷葉淨連翹營陰衛陽不和營不守衛不護當歸桂枝湯加橘半宜之風傷衛頭痛脈浮惡風翕翕發熱太陽病也疏解之桂枝湯加減治之風傷衛惡寒惡風脈浮緩熱芒於夜表邪猶在仍作太陽治之用桂枝湯加減冬溫一候頭蒙發熱脈浮數舌紅嗌乾風化火也清泄之羚羊角霜桑葉淨連翹大豆卷白杏仁大麥仁枇杷葉江枳殼冬溫發熱咳嗽脈浮數清解之大豆卷霜桑葉淨連翹玉桔梗川貝母鮮藕節白杏仁廣橘紅冬溫六日邪戀肺胃入暮熱之極囈語咳嗽氣急舌紅口渴脈未達者已化火也先從陽明解達得汗乃妥羚羊角霜桑葉雲茯苓大豆卷白杏仁淨連翹玉桔梗川貝母白蘆根枇杷葉江枳殼風溫病陽明兼走少陽表熱乍蒸乍退脈數咳嗽一候矣從少陽陽明清之香青蒿霜桑葉淨連翹大豆卷白杏仁枇杷葉玉桔梗川貝母鮮霍斛地骨皮冬濕一候化火內蒸表熱不揚舌紅苔黃脈浮數邪戀陽明猶蒙表分解達兼清以宣化氣機之蒙遏也羚羊角霜桑葉枇杷葉大豆卷肥玉竹白茆根玉桔梗江枳殼白杏仁淨連翹冬溫化熱陽明少陽兼症朝涼暮熱脈弦數舌絳苔黃仍以清化羚羊角香青蒿枇杷葉鮮生地川貝母廣橘紅大麥冬肥知母生甘草生石膏淨連翹瘧疾暑風為瘧化熱蒸灼脈眩數嗌乾渴飲陽明瘧也和解兼清之銀柴胡江枳殼雲茯苓括蔞廣陳皮大麥芽淡黃芩淡竹茹青荷梗寒輕熱重脈數而眩舌苔不布胸脘瞀悶陽明邪多於少陽也仍與柴胡加括蔞湯柴胡加括蔞根川通草火麻仁大麥仁暑風為瘧瘧日作作於夜脈弦而數寒熱俱甚解達之柴胡溫膽湯加枇杷葉大麥仁暑濕為瘧瘧雖輕短餘邪留戀脈濡極數居素中虛濕戀不清也和之乃穩六君子湯去參加生薑大棗大腹皮老年元虛不克瘧擾殊深變症扶正達邪小柴胡湯合當歸桂枝湯治之暑風化火為瘧必須甘寒化解與仲聖法竹葉石膏湯去芩治之暑風濕熱溷蒸為瘧瘧作間日寒輕熱重舌白苔黃脈弦數頭痛胸悶暑濕深重也當與提達兼和之銀柴胡仙半夏雲茯苓淡黃芩廣陳皮川通草括蔞仁江枳殼鮮蘆根大麥仁淡竹茹濕溫瘧間日作他時嘔惡頭脹少陽陽明瘧也和解兼清之香青蒿大腹皮雲茯苓肥知母廣陳皮淡竹茹江枳殼生薑皮生甘草濕溫化瘧瘧久傷陰脈細弦少陽陽明兩不和諧也滋清化之大生地肥知母天花粉鱉甲仙半夏淡竹茹香青蒿廣陳皮雲茯苓三陰瘧將及一載猶是蒸灼脈細數而弦獨在少陽一經只宜和解銀柴胡白歸身仙半夏鱉甲大白芍廣陳皮何首烏粉甘草雲茯苓瘧轉三陰由陽入陰也勢所纏鱉血拌銀柴胡仙半夏雲茯苓鱉甲廣陳皮大麥芽淡黃芩淡竹茹江枳殼炙甘草瘧作三陰經年矣雖能納穀脈細猶弦三陽腑病而為三陰臟病宜其拖延歲月達邪宜顧陰宜益氣氣能生陰則不能傷氣氣充而瘧可退也銀柴胡何首烏煨草果芋術仙半夏白歸身黃耆廣陳皮大白芍鱉甲淡黃芩雲茯苓粉甘草瘧後脈和司消導失權營衛尚不和諧惟恐寒熱復作何首烏仙半夏白歸身肥知母廣陳皮大白芍煨草果粉甘草雲茯苓鮮稻須瘧復作猶間日脈猶弦當和解不宜補銀柴胡江枳殼雲茯苓肥知母仙半夏粉甘草煨草果廣陳皮大麥仁白歸身瘧作寒重熱輕秋涼束暑也括蔞桂枝湯合二陳以治秋氣已肅瘧猶未止必須兩和營衛銀柴胡仙半夏白歸身川桂枝廣陳皮大白芍煨草果雲茯苓炙甘草伏暑瘧間日作而轉為三日一作邪兼厥大少是以設之三陰瘧也久則耗氣傷陰治宜和補截之未善也何首烏仙半夏白歸身左牡蠣廣陳皮大白芍絲瓜絡雲茯苓粉甘草鉤藤勾伏暑瘧轉為三陰瘧寒頗重脈反強細邪深伏也截之尚早宜乎兩調營衛銀柴胡仙半夏白歸身川桂枝廣陳皮大白芍淡黃芩雲茯苓生薑竹茹粉甘草大棗瘧邪深伏募原暑濕熱三氣頗重節交秋令瘧邪當令和解瘧邪必兼達原銀柴胡仙半夏檳榔真川連廣陳皮雲茯苓括蔞枳實粉甘草茯邪鬱蒸疸熱不寒日晡而作疸瘧也陽明邪兼少陽咳嗽脈浮且數宜從少陽陽明清之羚羊角川貝母淨連翹香青蒿江枳殼枇杷葉霜桑葉淡竹茹白杏仁廣橘紅伏暑瘧已在深秋秋涼氣肅反助鬱蒸望七之年氣營兩衰必當扶正而後達邪宜和解小柴胡湯治之新寒引動伏邪瘧髮間日寒頗重而熱輕短脈細小而遲衛氣不與營和也當歸桂枝湯治之瘧復作中虛不化也濕重白朮仙半夏大白芍江枳殼廣陳皮雲茯苓秫米胎瘧本易反復因循失治邪戀募原三月矣元不能復營衛失調則陰陽不和納少便溏脈微宜平中宮芋術仙半夏炙甘草大白芍廣陳皮秫米炮姜雲茯苓瘧後餘熱未盡內蒸由秋未至春初不瘥黃昏猶是潮熱脈細極數面目虛浮元氣不振餘邪未淨也邪雖留戀不可從表只宜扶肋正元元氣充復則餘邪自退矣制首烏芋術地骨皮大鱉甲仙半夏廣橘紅大生地女貞子雲茯苓大麥冬香青蒿炙甘草料豆衣似瘧非瘧纏二月餘咳嗽形消色奪脈芤數會失血青年得此大非所宜怯之一途不免矣制首烏川貝母廣橘紅大鱉甲女貞子炙甘草料豆衣地骨皮香青蒿大白芍痢疾便泄腹痛脈濡妨谷脾胃失司且與清暑和脾廣藿香仙半夏建神麯扁豆衣廣陳皮雲茯苓宣木瓜南查炭炙甘草鮮荷葉暑濕夾滯混蒸發熱熱退便泄腹痛舌苔猶膩脈濡數三焦夫貫清之和之廣霍香江枳殼春砂仁大豆卷建神麯雲茯苓飛滑石廣陳皮川通草淨連翹大麥仁表邪里出化而為痢痢下後重脈細數暑濕夾滯也當升清導滯粉葛根建神麯飛滑石真川連南查炭粉甘草淡黃芩小青皮失血陰虧之體又感暑邪迫腸而致便池和兼清之廣藿梗建神麯建軍子扃豆衣廣陳皮青荷梗淮山藥雲茯苓宣木瓜粉甘草暑傷氣濕阻氣表熱里泄脈微厄高年中虛邪戀必當溫陽達邪升麻公丁香雲茯苓芋術柿蒂粉甘草廣陳皮刀豆子白茅根老年中虛濕熱內阻阻閉三焦氣機上厄下腹痛脈微便溲短通貫三焦必兼溫陽逐邪芋術公丁香大白芍乾薑柿蒂炙甘草仙半夏刀豆子枇杷葉廣陳皮雲茯苓高年中虛氣逆厄喊野於朮刀豆子炙甘草代赭石乾薑枇杷葉仙半夏廣橘紅火麻仁大白芍始初霍亂而為痢痢下無度腹痛後重脈濡澀數邪滯深結中宮必當推蕩使下升麻廣木香小青皮粉葛根建神麯飛滑石野於朮南查炭粉甘草川稚連枳實方中葛升二昧似不甚合宜嘯山注暑邪夾滯混蒸為痢紅滯居多後重脈濡陽明氣隅先宜升清泄濁升麻川黃柏小青皮粉葛根福澤瀉廣陳皮野於朮建神麯粉甘草白歸身南查炭鮮荷蒂便泄三日當不後重脈濡數暑濕食滯留戀陽明急當升清降濁粉葛根建神麯炙甘草上白朮南查炭鮮荷邊廣木香上廣皮淡黃芩赤茯苓此方頗佳嘯山注伏暑釀痢冬令而發由冬及春至夏半載餘矣脈細數舌光紅痢傷陰也擬仲聖法黃連阿膠湯加建神麯南查炭廣橘白久痢傷陰惟宜鹹苦當復前法黃連阿膠湯加上冬朮上廣皮雲茯苓久痢半載餘矣脈數舌光大傷真陰惟宜滋降生地白芍黃連阿膠甘草陳皮山藥建神麯雞子黃雲茯苓痢後休息半載餘矣兩傷臟陰是以纏固攝足三陰一定之道真川連補骨脂肉果大熟地菟絲子大白芍上冬朮五昧子粉甘草清阿膠廣陳皮雞子黃妙方嘯山注休息痢將成一載且有夢泄足三陰臟真極虛也固攝之野於朮五味子云茯神大熟地肉果粉甘草補骨脂白歸身炮姜菟絲子大白芍淮小麥痢成休息固屬纏培補足三陰一定之理野於朮菟絲子廣陳皮大熟地五味子大白芍淡吳萸枸杞子粉甘草補骨脂肉果炮姜痢延半載餘成休息矣猶有下重脈細弦邪深藥淺是以纏李東垣清暑益氣主之益氣湯去參耆麥冬五味棗加大白芍廣木香治之痢成休息濁邪下阻清陽不升猶欲後重仍當升清泄濁升麻建神麯大白芍粉葛根南查炭廣陳皮野於朮福澤瀉小青皮茅朮川黃柏粉甘草廣木香白歸身休息久痢臟真極虛脈細無力溫攝脾腎先調奇經鹿角霜枸杞子廣陳皮野於朮肉果雲茯苓大熟地白歸身粉甘草菟絲子大白芍炮姜老年脾腎兩虛下痢而腰痛脈微細必當溫補脾腎庶可止之大熟地菟絲子廣陳皮厚杜仲五味子炙甘草補骨脂肉果炮姜痢已止胃納不醒宜培中土以資生化野於朮建神麯大白芍菟絲子上廣皮粉甘草益智仁雲茯苓痢下紅滯猶欲後重脈細極數初秋而起秋末未止氣陰兩虧濕滯留戀興仲聖法真川連淡黃芩大白芍清阿膠白頭翁粉甘草廣木香北秦皮雞子黃濕熱下痢百餘日矣州都亦不氣化以致濕熱壅阻是以久延不瘥先應導滯滋干與金匱豬苓湯原方豬苓雲茯苓飛滑石清阿膠福澤瀉久痢漸止溲又赤濕熱未淨也豬苓湯加野於朮上廣皮治之休息痢厯秋冬而延及春夏依然未瘥本土不和久矣術菟理中四神主之野於朮粉甘草五味子菟絲子淡吳萸肉果淡乾薑補骨脂大白芍雜症心神兩虛宜交坎離人參左牡蠣酸棗仁大熟地淮山藥云茯神大天冬山萸肉清阿膠花龍骨青年血氣初定而有道泄卻無夢境脈細尺數坎離失交皆已之心猿意馬也急宜畢姻以和陰陽不藥可愈雖如是然必須靜心勿屢動凡念以保天真尤為要旨治宜八仙長壽合救逆兩方中去丹皮澤瀉桂枝蜀漆茯苓加云茯神素體怯弱無他病惟不任煩勞下真不足也自保之大生地北沙參女貞子大麥冬淮山藥穭豆衣金石斛南缺實云茯神三陽頭痛陰不制陽陽升太過也即水火未濟之義須保下真真水充盈庶幾虛陽以涵陰而後可以止痛主治之法壯水以制陽光一定不易之道也大熟地淮山藥女貞子天門冬山萸肉穭豆衣明天麻石決明大白芍不得情志則有所思思則偏於心神為之失藏失守似癇非癇如呆而木脈促而亂大凡七情之感心肝脾不得其藏者而起也心藏神肝藏魂脾藏意一有不藏且不可況此全失其藏者乎填攝鎮三者兼施醫功草木調其偏勝然必自仗慧劍割斷心猿意馬之情庶可大生地淮山藥天竺黃大麥冬遠志肉陳膽星左牡蠣酸棗仁釣藤勾蒼龍齒云茯神天癸初至之年血氣未定情志漸動動則相火勝於君火即有遺泄淋濁之症陰氣過泄內熱自生日晡潮熱脈極細數虛火從此內煽有諾內形之外則生外瘍至虛之處便是客邪海底穴痛而腫者少陰腎經之隙處也瘍發於斯非所宜也總之不保下真而有斯疾必得自生慧劍割斷情魔庶幾守先夭以保後天不致相火勝於君火生化自有源流即可以保正命也勿以豫言為迂腐大熟地山萸肉化橘紅大夭冬五味子雲茯苓左牡蠣金櫻子湘蓮子心不藏神肝不藏魂肺不藏魄是以惕宕悸恐久為情志之病夫喜怒哀樂人之常情不可偏勝偏勝則有此種疾耳攝陰降陽鎮怯寧神一定之理也人參淮山藥炙甘草大熟地酸棗仁淮小麥大麥冬五味子左牡蠣云茯神男子十六天癸至至已三年血氣生勃勃則安無欲念之動動則安無暗傷真陰體肢不健不任煩勞脈又細數而耎胃納不旺面不華澤者為此故也急早畢姻所謂陰陽利萬物生矣北沙參淮山藥南芡實大熟地山萸肉云茯神大夭冬五味子炙甘草左牡蠣酸棗仁腎陰不足全乎相火用事以淋濁陰不制陽也知柏六味湯加大麥冬主之心腎兩虛不寐遺泄手足少陰交虧也逼近立春春陽暗動惟宜柔劑固二氣人參花龍骨酸棗仁大熟地淮山藥云茯神大麥冬南芡實湘蓮子左牡蠣五味子日有所思夜有所夢日有所見夜有所夢寧心屏意之六味去丹皮福澤瀉加金櫻子南芡實治之童稚甫交四齡體質柔脆血氣尚微生化遲呆而不長養責在先天之氣式微後天長助之氣乏權悠悠忽忽恐延童損北沙參淮山藥福澤瀉大熟地山萸肉五味子大麥冬粉丹皮水不涵木木火上升旋擾清真以致諸陽失降兼之誦讀勞心陽勝於陰陰不內守動靜偏勝靜以生陰動以生陽陽勝於陰久年矣必須填攝水藏以合天一生水之義六味去丹皮福澤瀉加北沙參大麥冬在牡蠣花龍骨女貞子穭豆衣南芡實湘蓮子雖云青血氣未充肝風內動口眼歪斜總屬腎水不涵肝木木火旋擾所致內不足之病也何其誤投瘋科瘋藥戕元纏如怯是誰之咎命也如何填攝真元涵水息風一定之理無他取圖求醫服劑不外草木草木功微安能速挽元氣於無何有之鄉耶全在已知命苟能知命庶可以立命也人參固本加明天麻五味子白蒺藜清阿膠石決明京元參海參先天少陰水虧不涵後天肝木木火上升旋擾常欲頭痛起在童時今當天癸初至之年尚未充發所以病後不復元真惟與填補先天真水以涵後天肝木古人錢仲陽專以六昧湯調治幼科此病虛先天非開情竇而斫喪者當從錢氏法治之中虛濕固五皮合五苓散治之濕熱內蒸蒸熱發黃脈澀數老年氣不勝濕濕戀於陽明平昔不嗜酒非酒濕也乃運谷遲呆水穀之濕所積當培中陽以化溫熱茵陳五苓散加川通草大麥仁廣陳皮主之肺氣不降脾氣不升升降失司咽塞胸悶脘痞三焦失貫妨納不便呼吸欲喘大凡上焦如霧中焦如漚下焦如瀆全失貫通之機寬與五子五皮飲風水積為皮水肢腫纏久矣藜藿之軀資生淡薄即所謂淡泊生腫脹也五皮四苓合進肺熱則失血脾實則腹脹血止而脹劇腫如鼓筋絡突見已成痼疾脾腎兩衰欲籍草本而奏功恐難挽天機也濟生腎氣丸朝夕開水送下三錢童子而傷水穀之濕濕熱內淫面腫脈細數小溲不利此謂濕腫野人所謂河白病也修之即愈無妨四苓散細木通生米仁五茄皮小青皮生草梢水腫面浮腹滿肢腫濕熱壅滯脾氣不運也且傷中陽甜冬朮福澤瀉大白芍淡乾薑廣陳皮粉甘草大腹皮雲茯苓陳冬米居素便溏脾陽久虛乘虛木侮腹脘痛脹脈細虛弦土衰木旺也木得桂而枯理中加川桂枝肉果雲茯苓陳冬米命門大衰火不生土以致脾泄雙培脾腎一定之理野於朮五味子粉甘草大熟地肉果炮姜補骨脂廣陳皮菟絲子大白芍足三陰二氣交虛虛則不化濕熱再以剛陽藥味助之濕熱漸這浸潤以致穀道生蟲平補二氣以化濕熱雖一定之法然化濕熱之法莫如鹹苦之方黃連阿膠湯為最加地榆廣陳皮雲茯苓治之始衰之年操勞太過易傳中宮胃納不旺常欲量眩脈細無力陰不內守陽亦衰也所以不制虛陽體豐者往往有之宜培二氣綿黃耆甘杞子粉甘草大熟地酸棗仁淮小麥野於朮雲茯苓龍眼肉方牡蠣大白芍胃主司納脾主消導不納不運脈數不鼓指脾胃樞機不利也先理中焦野於朮化橘紅大白芍廣木香柏子仁粉甘草大腹皮縮砂仁仙半夏雲茯苓友升太過右降不及肝胃之氣久已不和升太過者肝陽也擾心神而榮智慧降不及者胃氣也得穀粒而常反胃脈遲細而饃糊神志清而失慧養肝和胃以助資生大熟地酸棗仁天竺黃左牡蠣白歸身陳膽星花龍骨大白芍雲茯苓遠志肉炙甘草鉤藤勾肝脾腎多虧關於上中下三焦也肺陰不充脾陽不運腎氣不固上宜滋中宜培下宜攝兼顧為是人參厚杜仲化橘紅大麥冬淮山藥炙甘草大熟地菟絲子野於朮五味子天地之氣陽在上陰在下身身陽亦升於上至寒水之令頭面不溫而惡寒者陽氣不升於上縱然陽虛也茲在秋燥之際不宜辛溫惟恐劫液只宜扶氣氣即陽也嚴冬再論扶陽上黃耆菟絲子雲茯苓野於朮大白芍炮姜甘杞子炙甘草大棗脾胃多虛右脈衰微左尺更耎中下兩陽無以生土所以常自便泄兼夜數次必當溫培中下之陽以實脾土附子理中合四神淡吳萸易菟絲子加廣陳皮脾陽久虛無以運濕阻遏消導氣機以致中下兩陽式微脘脹復脹兩脈細澀幾成中滿溫陽泄濕且與真武湯姜用乾者腸風便泄久年矣本乘土也宜培中以紲本野於朮上廣皮雲茯苓廣木香大白芍炮姜菟絲子炙甘草便後下血遠血也宜培中下黑歸脾湯去遠志肉加伏龍肝老年真水下虧小溲不清濁陰不化水也現在脈不鼓指斷不可再瀉膀胱膀胱賢之府也瀉膀胱即瀉腎也年巳七旬癸水久絶填之不暇安可瀉乎雖有濕熱腎氣充足濕熱自化矣大熟地淮山藥清阿膠大天冬肥知母厚杜仲左牡蠣山萸肉雲茯苓懷牛膝甘杞子南芡實水虧少陰火盛陽明上實下虛陽升咯血目眩與張會稽法玉女煎加白茅根藕節童便咽痛百餘日矣少陰之脈循喉嚨挾舌本是少陰水虧不制處陽以錢仲陽補肺阿膠湯更添入鹹苦二更宜加元參玉桔梗陽明一經多氣血血熱妄行咯吐未止因失血生熱氣血兼清可也玉女前加川貝母地骨皮白茅根藕節齒痛將兩月而不瘥齒乃骨之餘亦陽明所屬少陰本也陽明標他攝少陰清陽明宜張會稽法玉女煎加白茅根人中黃牙衄陽明胃熱也清降之霍石斛石決明白茅根大生地女貞子鮮湖藕大麥冬穭豆衣久嗽肺腎兩虛金不生水水不制火火灼柔金是以纏甘昧滋養久服自愈三仙粥加燕窠交冬來天氣溫暖冬不藏陽人之陽氣亦不潛伏逼近冬至陽生陡然咯血脈細弦數猶恐血溢末止滋陰降陽自然之理川石斛北沙參海參大生地淮山藥鮮藕節大麥冬海蛤殼糯米瘍科中火症多也火多必有毒居素陰虛者不無受大纍瘁火性主動上升下降隨其所至所云臁瘡咽作痛者皆火毒之所發也陰氣充足自能制火化毒余非瘍科也所論悉元之於本夫人陰虧居多滋真陰和升降緩制火毒庶幾不失於正治也霍石斛土貝母人中白大生地肥知母象牙屑大麥冬石決明元參女貞子久嗽幾半載由夏秋來伏熱戀肺肺熱陰傷近吐穢痰肺癰之基也在秋末極燥之令當與西昌法清燥救肺湯去人參加川貝母風入腦鼻垂腥涕稠厚成塊脈數舌黃風化為火留戀肺胃鼻淵之機也羚羊角白蒺藜白茅根金石斛辛夷枇杷葉玉桔梗粉甘草肺胃熱熾生痰作嗽嗽久傷陰陰虛陽亢咳少嗆多脈細芤數痰見血點虛在少陰熱戀陽明初起無非風溫襲肺誤閉其邪邪郁化火灼肺肺為嬌柔柔藏不勝火灼致成勞嗽柔陰保金生水主用甘鹹大生地天花粉糯稻根大麥冬海蛤殼鮮湖藕肥知母燕窠冰糖百合雞白陽明失血脈細目晡膚熱血去過多傷及真陰陰虧陽亢治法無非攝陰潛陽草木之功究竟式微自保下真尤為耍著霍石斛淮山藥百合北沙參地骨皮南芡實大生地石決明鮮湖藕大麥冬海參陰火灼肺作嗽滋水降火正所以保金也北沙參川貝母湘蓮子大生地百合糯米大麥冬燕窩年老咳嗽嗽劇傷中中陽失運運谷呆遲司納消導脾胃所主脾胃中土也土虛無以勝濕從來脾戀濕化濕熱必專裁培中土土實可以勝濕也野於朮菟絲子雲茯苓仙半夏大白芍炮姜廣陳皮粉甘草衰年中虛痰飲上泛野於朮雲茯苓乾薑仙半夏粉甘草大麥芽化橘紅淡竹歷高年肺腎兩虛肺主出氣且主降腎主納氣且主藏肺不降腎不納則呼吸急促即謂喘也必宜填主然胃有濕痰不耐滋補從輕可也北沙參甜杏仁酸棗仁大生地肥玉竹百合大麥冬五味子燕窩清阿膠海蛤殼糯米哮喘久年痰泛作咳咳劇輒喘臥不著枕作於子醜二時哮乃肺病久則虛涉於腎肺主出氣腎主納氣雖然感風輒發發則氣根不立須自保下真現在平善保肺攝腎以固氣根庶可御外邪之侵大熟地淮山樂化橘紅大麥冬海參云茯神白杏仁海蛤殼痰飲病肺氣不降所以仍嗽清降為主桑白皮肥玉竹海浮石玉桔梗仙半夏化橘紅白杏仁廣陳皮枇杷葉高年肺陰內虛肺氣不降而致失音一載餘矣雖云肺虛實因肺襲風邪而起拖延已久風入肺俞肺屬金金空則鳴金實則無聲徒然補肺無益也與錢仲陽補肺阿膠湯治之酒鬲將成而竟戒酒可謂改過知命者尚可為金匱麥門冬湯加松子漿治之胃中虛客氣上逆而多噫曖納穀運遲脈濡細數中氣久虛真陰亦虧旋覆代赭湯去參姜加淮小麥大白芍廣橘白治之木火擾中納穀輒吐脈細無力鬲症也衰年矣雖治調之淡吳萸仙半夏大白芍大麥冬廣橘白粉甘草川椒柏子仁粳米煩勞傷中中陽失運納穀不化中脘作痛兩關脈軟斯中鬲也且培之歸脾湯去人參遠志肉加甘杞子廣橘白肝脾腎三陰素虧生化原流日薄納穀頗少資生失侍從來血生於穀谷無生血陰虧可知脈極耎細數中心嘈雜抑且不寐女子十四天癸至逾此二七之年正是壯盛之時而有斯疾責在先天真陰不充非關後天而然也仲聖復脈湯縣幾近之原方加湘蓮子左牡蠣廣橘白料豆衣中虛噎鬲務農之人鮮有者幸在青年猶可圖之金圖麥冬湯人參易海參加松子漿治之鬱怒傷肝肝矢條氣逆犯胃情志之病也苦辛酸甘兩和之淡吳萸白歸身仙半夏川楝子大白芍粉甘草桂湯炒廣橘皮小茴香烏梅胸痹胸痛引背背痛徹心括蔞桂枝湯加薤白通陽鉤藤勾宜絡廣橘皮和胃脘脅作痛按摩則緩脈弦細是為肝著著者肝絡之氣著而不移宜投金匱旋覆花湯治之肝木乘胃中脘作痛氣逆嘔惡泄木安土苦辛酸甘主之吳萸白芍半夏川連甘草乾薑橘絡柏子仁復診甘麥大棗湯脊痛而骨突三足年矣痛引腰膂虛損症也病屬奇經八脈之督帶是以疾因種種不可枚舉按婦科論二七天癸至五七天癸衰衰年損病難以復元補劑調理頤養天年以令正命熟地甘草菟絲子歸身杜仲山藥牡蠣阿膠芡實川斷杞子桑椹鹿角霜厥陰經肝經女科之先天老年肝血內枯肝陽失涵鼓動莫制眩暈耳鳴氣怯唇麻種種病機皆陰不涵陽之症也攝補肝陰生地阿膠茯神料豆衣女貞子白芍沙參牡蠣甘草棗仁高年水不涵木木火上升蒙竅目起內障夫肝開竅於目必須養肝養肝必先補腎熟地吳萸棗仁山藥杞子料豆衣蒺藜茯神望月沙谷餌資生任其胃氣大長齊不勝淡迫愚哉有何所而從其胃喜耶因此妨胃詬之醫工云羅適口之羹醒胃胃得喜而胃氣復矣沙參佛手扁豆麥冬山藥茯苓半夏芡實石斛稻葉病因多眵多淚淚為肝液眵屬肝熱養陰泄熱宜之生地胡麻石決明女貞子料豆衣白芍蒺藜山藥橘白女子先天在於肝肝鬱而兼濕熱致前陰結瘍小溲窒塞前方加味逍遙散條達肝鬱茲用金匱原方豬苓湯以清濕火肝經有熱發為腳氣劇則衝心必先制肝吳茱萸湯主之本方加牛膝陳皮茯苓白芍山藥心生血心惕易汗汗乃心液血從心化也補心必補血補血先涵氣氣能生血也人參熟地白芍白朮龍骨棗仁阿膠甘草陳皮牡蠣茯神杞子五味子南棗血海空虛肝血乏貯每每天癸定期二三月之久脈細如絲面浮肢腫厥少真陰枯耗是以結縭五載從未孕育熟地白芍丹皮杜仲杞子山藥歸身川斷橘白香附炙草奇經失調而致經漏久延則崩厥少太三陰皆空也宜堅聖法艾歸身川斷阿膠白芍社仲熟地炙草白朮烏賊血崩之後腹痛未止兩月矣經又至淋漓不斷又為經漏暴崩宜阿膠艾湯主之膠艾四物湯加山藥杞子甘草陳皮任脈為病帶下瘕聚熟地杞子白芍紫石英山藥杜仲菟絲子芡實川斷停經之脈細澀而不暢妊娠之脈滑搏而流利斯脈舉之若無按之濡耎是血虛之脈也夫虛藏於肝出於衝脈沖為血海故女子先天寄於斯所以古人云女以血為本補血攝衝任一定之理也膠艾四物湯加香附陳皮主之經阻三月脈數滑搏嘔吐妨谷妊象也當安之生地砂仁子芩歸身陳皮白芍白朮半夏曲甘草白苧經阻四月餘脈雖小而滑數納穀輒吐形色華澤微有寒熱此非停經乃有惡阻之甚者也和之安之香砂六君子丸去參加歸身子芩竹茹白芍白苧治之妊娠七月手太陰胎之際脈浮滑數胎元自在長養雖有汗不寬舒者火不胎靜也無妨熟地白芍子芩阿膠甘草砂仁歸身橘白白苧妊娠先血咳嗽而失音乃屬子嗽子瘖胎前不能愈分娩後自可紫苑湯去五昧子阿膠加歸身白芍麥冬治之産後將及兩月猶血不歸經脈弦細顯見不藏不統也與仲聖法生地牡蠣川斷杜仲白芍烏賊阿膠炙草山藥艾料豆衣女貞子厥陰肝氣貫鬲走脅痛脹縻定從經走絡也辛鹹通降之旋茯花湯加柏子仁桃仁歸鬚橘絡治之心生血肝藏血脾統血血從氣生氣不生血則生內熱心惕神疲脈微癸水愆期涼血一定之理生地炙草歸身麥冬白芍茯神杞子棗仁橘白牡蠣鬱怒傷肝肝失條達暗乘中土木旺而肝氣氣流於絡右遍季脅作痛雖平善有斯疾不能保其不發也作時宜通宜泄平善宜滋宜降首烏白芍茯神杞子炙草柏子仁牡蠣橘白料豆衣
